name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install ncurses (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev

      - name: build
        run: make

      - name: package
        run: |
          mkdir -p dist
          cp jump dist/jump-${{ matrix.target }}
          tar -czf dist/jump-${{ matrix.target }}.tar.gz -C dist jump-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: package completions
        run: |
          tar -czf dist/lilypad-completions.tar.gz completions/

      - name: gh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes_arg=""
          if [ -f RELEASE_NOTES.md ]; then notes_arg="--notes-file RELEASE_NOTES.md"; fi
          # shellcheck disable=SC2086
          gh release create "${GITHUB_REF_NAME}" $notes_arg \
            dist/jump-linux-x86_64 \
            dist/jump-darwin-arm64 \
            dist/jump-linux-x86_64.tar.gz \
            dist/jump-darwin-arm64.tar.gz \
            dist/lilypad-completions.tar.gz
